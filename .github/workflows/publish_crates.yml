name: Publish to Crates.io

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish to Crates.io via Trusted Publisher
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Cache
        uses: Swatinem/rust-cache@v2

      - name: Install gcc-13
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-13 g++-13
          echo "CC=gcc-13" >> $GITHUB_ENV
          echo "CXX=g++-13" >> $GITHUB_ENV

      # Automatically exchanges the GitHub Actions OIDC token for a short-lived crates.io token
      - name: Authenticate with crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      # Crates must be published in dependency order.
      # `cargo publish` natively waits for the index to update before completing.
      - name: Publish all crates safely to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          cargo publish -p graphyn-core
          cargo publish -p graphyn-store
          cargo publish -p graphyn-adapter-ts
          cargo publish -p graphyn-mcp
          cargo publish -p graphyn-cli
